# Shows a "Sponsor" button on this GitHub repo. Uncomment/fill the platform(s)
# you use, then commit. Copy this file into each public repo you want the button
# on (kestrel, examples, std, kestrel-build.github.io).
#
# GitHub Sponsors (requires enrolling at github.com/sponsors first):
# github: [your-github-username]
#
# Third-party platforms (just your handle, no URL):
# ko_fi: your-ko-fi-name
# buy_me_a_coffee: your-bmac-name
# patreon: your-patreon-name
# open_collective: your-collective
#
# Any other link(s) — e.g. PayPal, a donate page:
# custom: ["https://example.com/donate"]
