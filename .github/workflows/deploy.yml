name: Deploy docs

on:
  push:
    branches: [main]
  # Rebuild nightly so the site refreshes even without a commit (picks up the
  # latest release, blog dates, and any build-time content). 06:00 UTC.
  schedule:
    - cron: "0 6 * * *"
  # Allow a manual redeploy from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
      # Reproducible: install the pinned deps, not whatever is latest today.
      - run: pip install -r requirements.txt
      # --strict turns broken links / bad nav into a failed build instead of a
      # silently broken page shipping to production.
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
